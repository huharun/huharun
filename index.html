<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Arun Thangapalam | Engineer</title>
  <meta name="description" content="Arun Thangapalam — AI/ML & Full-Stack Software Engineer. Portfolio showcasing projects, experience, and skills.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- CSS Modules -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/widgets.css">
  <link rel="stylesheet" href="css/apps.css">
  <link rel="stylesheet" href="css/theme.css">
</head>
<body>

  <!-- Star field canvas -->
  <canvas id="star-canvas" aria-hidden="true"></canvas>

  <!-- =====================================================
       HOME DASHBOARD
  ====================================================== -->
  <div id="dashboard">

    <!-- Dashboard Grid -->
    <main class="dashboard-grid" id="dashboard-grid">

      <!-- 1A · Profile -->
      <div class="widget widget-profile">
        <div class="widget-label">PROFILE</div>
        <div class="profile-avatar" id="dash-avatar"></div>
        <div class="profile-name" id="dash-name"></div>
        <div class="profile-title holo" id="dash-title"></div>
        <div class="profile-meta" id="dash-meta"></div>
        <div class="profile-socials" id="dash-socials"></div>
      </div>

      <!-- 1B · At a Glance (2 cols) -->
      <div class="widget widget-glance col-span-2">
        <div class="widget-label">AT A GLANCE</div>
        <div id="glance-content" class="glance-container"></div>
      </div>

      <!-- 2A · Quick Access -->
      <div class="widget widget-launcher">
        <div class="widget-label">QUICK ACCESS</div>
        <div class="launcher-grid"></div>
      </div>

      <!-- 2B · Files -->
      <div class="widget widget-files">
        <div class="widget-label label-accent-blue">FILES</div>
        <div class="files-grid"></div>
      </div>

      <!-- 2C · Character -->
      <div class="widget widget-character" data-app="character">
        <div class="widget-label label-accent-green">CHARACTER</div>
        <div id="character-mini-quote" class="quote-container"></div>
      </div>

    </div>

    <!-- App Views Root -->
    <div class="app-views-root">
      
      <!-- 0. Character App (Music + Quotes) -->
      <div id="app-character" class="app-view">
        <div class="app-topbar">
          <button class="back-btn"></button>
          <span class="app-topbar-title">CHARACTER</span>
          <div class="topbar-spacer"></div>
        </div>
        <div class="app-body no-scrollbar">
          <div id="character-app-content" class="character-app-container"></div>
        </div>
      </div>

    <div id="app-about" class="app-view">
      <div class="app-topbar">
        <button class="back-btn"></button>
        <span class="app-topbar-title">About Me</span>
        <div class="topbar-spacer"></div>
      </div>
      <div class="app-body"><section id="about"></section></div>
    </div>

    <div id="app-books" class="app-view">
      <div class="app-topbar">
        <button class="back-btn"></button>
        <span class="app-topbar-title">Books</span>
        <div class="topbar-spacer"></div>
      </div>
      <div class="app-body">
        <section id="books"></section>
      </div>
    </div>

    <div id="app-experience" class="app-view">
      <div class="app-topbar">
        <button class="back-btn"></button>
        <span class="app-topbar-title">Work Experience</span>
        <div class="topbar-spacer"></div>
      </div>
      <div class="app-body">
        <section id="experience"></section>
      </div>
    </div>

    <div id="app-projects" class="app-view">
      <div class="app-topbar">
        <button class="back-btn"></button>
        <span class="app-topbar-title">Projects</span>
        <div class="topbar-spacer"></div>
      </div>
      <div class="app-body">
        <section id="projects">
          <div class="section-label">BUILT BY ME</div>
          <div class="search-bar-row">
            <div class="search-bar"><input type="text" id="project-search" placeholder="Search projects…"></div>
          </div>
          <div class="filter-chips">
            <button class="chip active" data-tag="all">All</button>
            <button class="chip" data-tag="Python">Python</button>
            <button class="chip" data-tag="JavaScript">JavaScript</button>
            <button class="chip" data-tag="Next.js">Next.js</button>
            <button class="chip" data-tag="Docker">Docker</button>
          </div>
          <div id="projects-list" class="projects-grid"></div>
        </section>
      </div>
    </div>

    <div id="app-contact" class="app-view">
      <div class="app-topbar">
        <button class="back-btn"></button>
        <span class="app-topbar-title"></span>
        <div class="topbar-spacer"></div>
      </div>
      <div class="app-body">
        <section id="contact">
          <div class="section-label"></div>
          <div class="messages-container">
            <div class="messages-header">
              <div class="messages-avatar" id="contact-avatar"></div>
              <div>
                <div class="messages-name"></div>
                <div class="messages-status"></div>
              </div>
            </div>
            <div class="messages-body">
              <div class="bubble bubble-in"><p></p><span class="bubble-time">Delivered</span></div>
              <form id="email-form" action="" method="POST" class="message-form">
                <div class="form-field"><span class="field-label"></span><div class="bubble bubble-out"><input type="text" name="name" placeholder="" required></div></div>
                <div class="form-field"><span class="field-label"></span><div class="bubble bubble-out"><input type="email" name="email" placeholder="" required></div></div>
                <div class="form-field"><span class="field-label"></span><div class="bubble bubble-out"><textarea name="message" placeholder="" rows="2" required></textarea></div></div>
                <div class="form-footer"><span class="form-subject"></span><button type="submit" class="send-btn" aria-label="Send"></button></div>
              </form>
              <p id="success-message" class="hidden form-success"></p>
              <p id="error-message" class="hidden form-error"></p>
            </div>
          </div>
        </section>
      </div>
    </div>

  </div>

  <!-- Modal Overlay (Generic for PDFs/Links) -->
  <div id="modal-overlay" class="modal hidden">
    <div class="modal-sheet">
      <div class="modal-header">
        <span id="modal-title" class="modal-title">Viewer</span>
        <button class="modal-close" id="modal-close">DONE</button>
      </div>
      <iframe id="modal-iframe" class="modal-iframe" src="about:blank"></iframe>
    </div>
  </div>

  <!-- Theme Toggle -->
  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme"></button>

  <!-- Main Entry Module -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
